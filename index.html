<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#05070c;
color:#e6e9ef;
overflow-x:hidden;
}

/* animated gradient */

body::before{
content:'';
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,#3a7bff33,transparent 70%);
top:-200px;
left:-200px;
filter:blur(120px);
animation:float 14s infinite alternate;
}

@keyframes float{
0%{transform:translate(0,0)}
100%{transform:translate(250px,180px)}
}

/* cursor glow */

.cursor{
position:fixed;
width:400px;
height:400px;
pointer-events:none;
background:radial-gradient(circle,#5a8cff33,transparent 70%);
transform:translate(-50%,-50%);
filter:blur(80px);
z-index:0;
}

.container{
max-width:1300px;
margin:auto;
padding:40px 24px;
position:relative;
z-index:1;
}

.title{
font-size:32px;
font-weight:600;
}

.subtitle{
font-size:13px;
opacity:.6;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#12161f;
border-radius:18px;
padding:20px;
box-shadow:0 15px 60px rgba(0,0,0,.6);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 25px 80px rgba(0,0,0,.8);
}

.stat{
font-size:26px;
font-weight:600;
margin-top:6px;
}

.small{
font-size:12px;
opacity:.65;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:5px 0;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="container">

<div class="title">Portfolio Console</div>
<div class="subtitle">Deepankar • Investor OS</div>

<div class="grid">

<div class="card">
<h3>Portfolio Value</h3>
<div class="stat" id="value">₹0</div>
</div>

<div class="card">
<h3>Add Order Screenshot</h3>
<input type="file" id="orderUpload" accept="image/*">
<div id="uploadStatus" class="small"></div>
</div>

<div class="card">
<h3>Holdings</h3>
<table id="holdingsTable"></table>
</div>

<div class="card">
<h3>Portfolio Growth</h3>
<canvas id="performanceChart"></canvas>
</div>

<div class="card">
<h3>SIP Engine</h3>
<div class="stat">₹2100 / month</div>
<canvas id="sipChart"></canvas>
</div>

</div>

</div>

<script>

/* cursor animation */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* portfolio memory */

let portfolio = JSON.parse(localStorage.getItem("portfolio")) || {
stocks:[],
mfs:[]
}

/* save function */

function savePortfolio(){
localStorage.setItem("portfolio",JSON.stringify(portfolio))
}

/* OCR upload */

document.getElementById("orderUpload").addEventListener("change",async function(){

const file=this.files[0]

document.getElementById("uploadStatus").innerText="Reading order..."

const result=await Tesseract.recognize(file,'eng')

const text=result.data.text

processOrder(text)

})

/* parse order */

function processOrder(text){

let stock=text.match(/ITC|SBIN|POWERGRID|RELIANCE/i)
let qty=text.match(/Quantity\s*(\d+)/i)
let price=text.match(/₹\s*([0-9,.]+)/)

if(stock && qty){

portfolio.stocks.push({
symbol:stock[0].toUpperCase(),
qty:parseInt(qty[1]),
price:parseFloat(price[1])
})

savePortfolio()

}

if(text.includes("Fund") || text.includes("Nifty")){

portfolio.mfs.push({
name:"MF Investment",
amount:parseFloat(price[1])
})

savePortfolio()

}

updatePortfolio()

}

/* update portfolio value */

function updatePortfolio(){

let total=0

portfolio.stocks.forEach(s=>{
total+=s.qty*s.price
})

portfolio.mfs.forEach(m=>{
total+=m.amount
})

document.getElementById("value").innerText="₹"+total.toFixed(2)

renderTable()

updatePerformance(total)

}

/* holdings table */

function renderTable(){

const table=document.getElementById("holdingsTable")

table.innerHTML=""

portfolio.stocks.forEach(s=>{
table.innerHTML+=`<tr><td>${s.symbol}</td><td>${s.qty}</td><td>₹${s.price}</td></tr>`
})

portfolio.mfs.forEach(m=>{
table.innerHTML+=`<tr><td>${m.name}</td><td>-</td><td>₹${m.amount}</td></tr>`
})

}

/* performance tracking */

function updatePerformance(value){

let perf=JSON.parse(localStorage.getItem("perf")) || []

perf.push({date:Date.now(),value:value})

localStorage.setItem("perf",JSON.stringify(perf))

renderPerformance()

}

/* render performance chart */

function renderPerformance(){

let perf=JSON.parse(localStorage.getItem("perf")) || []

new Chart(document.getElementById("performanceChart"),{
type:"line",
data:{
labels:perf.map(p=>new Date(p.date).toLocaleDateString()),
datasets:[{
data:perf.map(p=>p.value),
borderColor:"#4da3ff",
fill:false
}]
}
})

}

/* SIP chart */

new Chart(document.getElementById("sipChart"),{
type:"bar",
data:{
labels:["UTI Nifty","ICICI Next 50","Nippon Multi Cap"],
datasets:[{
data:[1300,600,200],
backgroundColor:"#4da3ff"
}]
},
options:{plugins:{legend:{display:false}}}
})

updatePortfolio()

</script>

</body>
</html>
