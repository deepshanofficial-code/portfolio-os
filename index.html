.card{

<div class="cursor" id="cursor"></div>

<div class="stat" id="invested"></div>

<div id="timeline"></div>
</div>

</div>

<div class="card">

<h3>Update Market Price</h3>

<select id="priceAsset"></select>
<input id="marketPrice" placeholder="Latest price">

<button onclick="updatePrice()">Update</button>

</div>

<div class="card">

<h3>Reset Stocks</h3>

<button onclick="clearStocks()">Clear Stock Holdings</button>

</div>

</div>

<div class="rowCharts">

</div>

</div>

<div class="quote" id="quote"></div>

<script>

/* cursor */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* storage */

let ledger=JSON.parse(localStorage.getItem("ledger"))||[]
let prices=JSON.parse(localStorage.getItem("prices"))||{}

/* BUY */

function buy(){

let type=document.getElementById("assetType").value
let name=document.getElementById("name").value.trim()

let qty=parseFloat(document.getElementById("qty").value)
let price=parseFloat(document.getElementById("price").value)

if(!name||isNaN(qty)||isNaN(price)) return

ledger.push({
type:"buy",
asset:type,
name,
qty,
price,
date:new Date()
})

save()

}

/* SELL */

function sell(){

let name=document.getElementById("sellAsset").value
let qty=parseFloat(document.getElementById("sellQty").value)
let price=parseFloat(document.getElementById("sellPrice").value)

if(!name||isNaN(qty)||isNaN(price)) return

ledger.push({
type:"sell",
name,
qty,
price,
date:new Date()
})

save()

}

/* UPDATE PRICE */

function updatePrice(){

let name=document.getElementById("priceAsset").value
let p=parseFloat(document.getElementById("marketPrice").value)

if(!name||isNaN(p)) return

prices[name]=p

save()

}

/* EDIT NAME */

function edit(asset){

let newName=prompt("Correct asset name",asset)

if(!newName) return

ledger.forEach(t=>{
if(t.name===asset) t.name=newName
})

if(prices[asset]){
prices[newName]=prices[asset]
delete prices[asset]
}

save()

}

/* CLEAR STOCKS */

function clearStocks(){

let confirmReset=confirm("Clear all STOCK holdings? Mutual funds remain.")

ledger=ledger.filter(t=>t.asset==="mf")

render()

}

function save(){

localStorage.setItem("ledger",JSON.stringify(ledger))
localStorage.setItem("prices",JSON.stringify(prices))

render()

}
