<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio Input</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#05070c;
color:#e6e9ef;
margin:0;
padding:40px;
}

.card{
background:#12161f;
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
background:#0e1219;
border:none;
color:white;
border-radius:8px;
}

button{
padding:10px 16px;
background:#4da3ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Portfolio Input Console</h1>

<div class="card">

<h3>Add Stock Purchase</h3>

<input id="stockSymbol" placeholder="Stock Symbol">
<input id="stockQty" placeholder="Quantity">
<input id="stockPrice" placeholder="Buy Price">
<input type="date" id="stockDate">

<button onclick="addStock()">Add Stock</button>

</div>

<div class="card">

<h3>Add Mutual Fund SIP</h3>

<input id="mfName" placeholder="Fund Name">
<input id="mfAmount" placeholder="Monthly SIP Amount">
<input type="date" id="mfStart">
<input id="mfNAV" placeholder="Current NAV (optional)">

<button onclick="addMF()">Add MF SIP</button>

</div>

<div class="card">

<h3>Update Stock Market Price</h3>

<input id="priceSymbol" placeholder="Stock Symbol">
<input id="latestPrice" placeholder="Latest Price">

<button onclick="updatePrice()">Update</button>

</div>

<script>

let transactions = JSON.parse(localStorage.getItem("transactions")) || []
let prices = JSON.parse(localStorage.getItem("prices")) || {}

function save(){
localStorage.setItem("transactions",JSON.stringify(transactions))
localStorage.setItem("prices",JSON.stringify(prices))
}

function addStock(){

let symbol=document.getElementById("stockSymbol").value.toUpperCase()
let qty=Number(document.getElementById("stockQty").value)
let price=Number(document.getElementById("stockPrice").value)
let date=document.getElementById("stockDate").value

transactions.push({
type:"stock",
symbol,
qty,
price,
date
})

save()
alert("Stock added")

}

function addMF(){

let fund=document.getElementById("mfName").value
let amount=Number(document.getElementById("mfAmount").value)
let start=document.getElementById("mfStart").value
let nav=document.getElementById("mfNAV").value

transactions.push({
type:"mf",
fund,
amount,
start,
nav
})

save()
alert("MF SIP added")

}

function updatePrice(){

let symbol=document.getElementById("priceSymbol").value.toUpperCase()
let price=Number(document.getElementById("latestPrice").value)

prices[symbol]=price

save()
alert("Price updated")

}

</script>

</body>
</html>
