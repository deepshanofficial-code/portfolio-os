<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#05070c;
color:#e6e9ef;
overflow-x:hidden;
}

/* floating background */

body::before{
content:'';
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#3a7bff33,transparent 70%);
top:-200px;
left:-200px;
filter:blur(120px);
animation:float 14s infinite alternate;
}

@keyframes float{
0%{transform:translate(0,0)}
100%{transform:translate(300px,200px)}
}

/* cursor glow */

.cursor{
position:fixed;
width:400px;
height:400px;
pointer-events:none;
background:radial-gradient(circle,#5a8cff33,transparent 70%);
transform:translate(-50%,-50%);
filter:blur(80px);
z-index:0;
}

/* layout */

.container{
max-width:1300px;
margin:auto;
padding:40px;
position:relative;
z-index:1;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#12161f;
border-radius:18px;
padding:20px;
box-shadow:0 15px 60px rgba(0,0,0,.6);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.full{
grid-column:1/-1;
}

.stat{
font-size:26px;
font-weight:600;
margin-top:6px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
background:#0e1219;
border:none;
border-radius:8px;
color:white;
}

button{
margin-top:10px;
padding:10px;
background:#4da3ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:6px 0;
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="container">

<h1>Portfolio OS</h1>

<div class="grid">

<div class="card">
<h3>Total Invested</h3>
<div id="invested" class="stat"></div>
</div>

<div class="card">
<h3>Current Portfolio</h3>
<div id="current" class="stat"></div>
<div id="profit"></div>
</div>

<div class="card">
<h3>Realised Profit</h3>
<div id="realised" class="stat"></div>
</div>

<div class="card">

<h3>Buy Stock</h3>

<input id="symbol" placeholder="Stock Symbol">
<input id="qty" placeholder="Qty">
<input id="price" placeholder="Buy Price">

<button onclick="buyStock()">Buy</button>

</div>

<div class="card">

<h3>Sell Stock</h3>

<input id="sellSymbol" placeholder="Stock Symbol">
<input id="sellQty" placeholder="Qty">
<input id="sellPrice" placeholder="Sell Price">

<button onclick="sellStock()">Sell</button>

</div>

<div class="card">

<h3>Add MF SIP</h3>

<input id="fund" placeholder="Fund name">
<input id="sip" placeholder="Monthly SIP">
<input type="date" id="start">

<button onclick="addMF()">Add SIP</button>

</div>

<div class="card">

<h3>Update Market Price</h3>

<input id="psymbol" placeholder="Stock">
<input id="marketPrice" placeholder="Latest Price">

<button onclick="updatePrice()">Update</button>

</div>

<div class="card">
<h3>Holdings</h3>
<table id="holdings"></table>
</div>

<div class="card">
<h3>Monthly Activity</h3>
<div id="timeline"></div>
</div>

<div class="card full">
<h3>Portfolio Allocation</h3>
<canvas id="alloc"></canvas>
</div>

<div class="card full">
<h3>Future Wealth</h3>
<canvas id="future"></canvas>
</div>

</div>

</div>

<script>

/* cursor */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* storage */

let ledger=JSON.parse(localStorage.getItem("ledger"))||[]
let prices=JSON.parse(localStorage.getItem("prices"))||{}

/* BUY */

function buyStock(){

let symbol=document.getElementById("symbol").value.toUpperCase()
let qty=Number(document.getElementById("qty").value)
let price=Number(document.getElementById("price").value)

ledger.push({
type:"buy",
symbol,
qty,
price,
date:new Date()
})

save()

}

/* SELL */

function sellStock(){

let symbol=document.getElementById("sellSymbol").value.toUpperCase()
let qty=Number(document.getElementById("sellQty").value)
let price=Number(document.getElementById("sellPrice").value)

ledger.push({
type:"sell",
symbol,
qty,
price,
date:new Date()
})

save()

}

/* MF */

function addMF(){

let fund=document.getElementById("fund").value
let sip=Number(document.getElementById("sip").value)
let start=document.getElementById("start").value

ledger.push({
type:"mf",
fund,
sip,
start
})

save()

}

/* update price */

function updatePrice(){

let s=document.getElementById("psymbol").value.toUpperCase()
let p=Number(document.getElementById("marketPrice").value)

prices[s]=p

save()

}

/* save */

function save(){

localStorage.setItem("ledger",JSON.stringify(ledger))
localStorage.setItem("prices",JSON.stringify(prices))

render()

}

/* render */

function render(){

let holdings={}
let invested=0
let current=0
let realised=0

let timeline=""

ledger.forEach(t=>{

if(t.type==="buy"){

holdings[t.symbol]=(holdings[t.symbol]||0)+t.qty

invested+=t.qty*t.price

let last=prices[t.symbol]||t.price
current+=t.qty*last

timeline+=`${t.symbol} BUY ${t.qty} @ ₹${t.price}<br>`

}

if(t.type==="sell"){

holdings[t.symbol]-=t.qty

realised+=t.qty*(t.price)

timeline+=`${t.symbol} SELL ${t.qty} @ ₹${t.price}<br>`

}

if(t.type==="mf"){

let start=new Date(t.start)
let today=new Date()

let months=(today.getFullYear()-start.getFullYear())*12+(today.getMonth()-start.getMonth())

if(today.getDate()>=10) months++

let total=months*t.sip

invested+=total
current+=total

timeline+=`${t.fund} SIP ₹${t.sip}<br>`

}

})

document.getElementById("invested").innerText="₹"+invested.toFixed(2)
document.getElementById("current").innerText="₹"+current.toFixed(2)
document.getElementById("realised").innerText="₹"+realised.toFixed(2)

document.getElementById("profit").innerText="P/L ₹"+(current-invested).toFixed(2)

document.getElementById("timeline").innerHTML=timeline

let table=document.getElementById("holdings")
table.innerHTML=""

for(let s in holdings){

if(holdings[s]>0){

table.innerHTML+=`<tr><td>${s}</td><td>${holdings[s]}</td></tr>`

}

}

/* allocation */

new Chart(document.getElementById("alloc"),{

type:"doughnut",

data:{
labels:["Stocks","Mutual Funds"],
datasets:[{
data:[invested,current-invested],
backgroundColor:["#4da3ff","#ff5c7a"]
}]
}

})

/* future wealth */

let sip=2100
let r=0.12/12
let total=0
let vals=[]

for(let i=0;i<240;i++){

total=total*(1+r)+sip

if(i%12===0) vals.push(Math.round(total))

}

new Chart(document.getElementById("future"),{

type:"line",

data:{
labels:Array.from({length:20},(_,i)=>i+1),
datasets:[{
data:vals,
borderColor:"#4da3ff"
}]
}

})

}

render()

</script>

</body>
</html>
