<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#05070c;
color:#e6e9ef;
overflow-x:hidden;
}

/* animated gradient background */

body::before{
content:'';
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#3a7bff33,transparent 70%);
top:-200px;
left:-200px;
filter:blur(120px);
animation:float 16s infinite alternate;
}

@keyframes float{
0%{transform:translate(0,0)}
100%{transform:translate(280px,200px)}
}

/* cursor glow */

.cursor{
position:fixed;
width:380px;
height:380px;
pointer-events:none;
background:radial-gradient(circle,#5a8cff33,transparent 70%);
transform:translate(-50%,-50%);
filter:blur(80px);
}

.container{
max-width:1300px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:rgba(18,22,31,.8);
backdrop-filter:blur(16px);
border-radius:18px;
padding:20px;
box-shadow:0 15px 60px rgba(0,0,0,.6);
}

.stat{
font-size:24px;
font-weight:600;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
background:#0e1219;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px;
background:#4da3ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.rowCharts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

canvas{
max-height:240px;
}

table{
width:100%;
}

.quote{
margin-top:30px;
opacity:.7;
font-style:italic;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="container">

<h1>Portfolio Dashboard</h1>

<div class="grid">

<div class="card">
<h3>Total Invested</h3>
<div class="stat" id="invested"></div>
</div>

<div class="card">
<h3>Current Portfolio</h3>
<div class="stat" id="current"></div>
<div id="profit"></div>
</div>

<div class="card">
<h3>Holdings</h3>
<table id="holdings"></table>
</div>

<div class="card">
<h3>Monthly Activity</h3>
<div id="timeline"></div>
</div>

<div class="card">

<h3>Buy Asset</h3>

<select id="assetType">
<option value="stock">Stock</option>
<option value="mf">Mutual Fund</option>
</select>

<input id="name" placeholder="Stock or Fund Name">
<input id="qty" placeholder="Qty (or SIP)">
<input id="price" placeholder="Buy price / NAV">

<button onclick="buy()">Add</button>

</div>

<div class="card">

<h3>Sell Asset</h3>

<select id="sellAsset"></select>
<input id="sellQty" placeholder="Qty / Units">
<input id="sellPrice" placeholder="Sell price">

<button onclick="sell()">Sell</button>

</div>

<div class="card">

<h3>Update Market Price</h3>

<select id="priceAsset"></select>
<input id="marketPrice" placeholder="Latest price">

<button onclick="updatePrice()">Update</button>

</div>

</div>

<div class="rowCharts">

<div class="card">
<h3>Portfolio Allocation</h3>
<canvas id="allocChart"></canvas>
</div>

<div class="card">
<h3>Future Wealth</h3>
<canvas id="futureChart"></canvas>
</div>

</div>

<div class="quote" id="quote"></div>

</div>

<script>

/* cursor */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* storage */

let ledger=JSON.parse(localStorage.getItem("ledger"))||[]
let prices=JSON.parse(localStorage.getItem("prices"))||{}

/* BUY */

function buy(){

let type=document.getElementById("assetType").value
let name=document.getElementById("name").value
let qty=parseFloat(document.getElementById("qty").value)
let price=parseFloat(document.getElementById("price").value)

ledger.push({
type:"buy",
asset:type,
name,
qty,
price,
date:new Date()
})

save()

}

/* SELL */

function sell(){

let name=document.getElementById("sellAsset").value
let qty=parseFloat(document.getElementById("sellQty").value)
let price=parseFloat(document.getElementById("sellPrice").value)

ledger.push({
type:"sell",
name,
qty,
price,
date:new Date()
})

save()

}

/* price update */

function updatePrice(){

let name=document.getElementById("priceAsset").value
let p=parseFloat(document.getElementById("marketPrice").value)

prices[name]=p

save()

}

/* save */

function save(){

localStorage.setItem("ledger",JSON.stringify(ledger))
localStorage.setItem("prices",JSON.stringify(prices))

render()

}

/* render */

function render(){

let holdings={}
let invested=0
let current=0

let timeline=""

ledger.forEach(t=>{

if(t.type==="buy"){

holdings[t.name]=(holdings[t.name]||0)+t.qty

invested+=t.qty*t.price

let last=prices[t.name]||t.price
current+=t.qty*last

timeline+=`${t.name} BUY ${t.qty} @ ₹${t.price}<br>`

}

if(t.type==="sell"){

holdings[t.name]-=t.qty

timeline+=`${t.name} SELL ${t.qty} @ ₹${t.price}<br>`

}

})

/* holdings table */

let table=document.getElementById("holdings")
table.innerHTML=""

for(let a in holdings){

if(holdings[a]>0){

table.innerHTML+=`
<tr>
<td>${a}</td>
<td>${holdings[a]}</td>
<td><button onclick="edit('${a}')">Edit</button></td>
</tr>
`

}

}

/* dropdowns */

let list=Object.keys(holdings)

document.getElementById("sellAsset").innerHTML=list.map(a=>`<option>${a}</option>`).join("")
document.getElementById("priceAsset").innerHTML=list.map(a=>`<option>${a}</option>`).join("")

/* stats */

document.getElementById("invested").innerText="₹"+invested.toFixed(2)
document.getElementById("current").innerText="₹"+current.toFixed(2)

document.getElementById("profit").innerText="P/L ₹"+(current-invested).toFixed(2)

document.getElementById("timeline").innerHTML=timeline

/* allocation chart */

let alloc=new Chart(document.getElementById("allocChart"),{

type:"doughnut",

data:{
labels:["Equity","Funds"],
datasets:[{
data:[invested,current-invested],
backgroundColor:["#4da3ff","#ff5c7a"]
}]
},

options:{plugins:{legend:{display:false}}}

})

/* future projection */

let sip=2100
let r=0.12/12
let total=0
let vals=[]

for(let i=0;i<240;i++){

total=total*(1+r)+sip

if(i%12===0) vals.push(Math.round(total))

}

new Chart(document.getElementById("futureChart"),{

type:"line",

data:{
labels:Array.from({length:20},(_,i)=>i+1),
datasets:[{
data:vals,
borderColor:"#4da3ff",
tension:.3
}]
},

options:{plugins:{legend:{display:false}}}

})

/* nerd quotes */

const quotes=[
"Compounding quietly rewrites your future.",
"Markets fluctuate. Discipline compounds.",
"Every SIP is a vote for your future self.",
"Time in market > timing the market."
]

document.getElementById("quote").innerText=quotes[Math.floor(Math.random()*quotes.length)]

}

render()

</script>

</body>
</html>
