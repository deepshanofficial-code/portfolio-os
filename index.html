<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#05070c;
color:#e6e9ef;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#3a7bff33,transparent 70%);
top:-200px;
left:-200px;
filter:blur(120px);
animation:float 16s infinite alternate;
}

@keyframes float{
0%{transform:translate(0,0)}
100%{transform:translate(280px,200px)}
}

.cursor{
position:fixed;
width:380px;
height:380px;
pointer-events:none;
background:radial-gradient(circle,#5a8cff33,transparent 70%);
transform:translate(-50%,-50%);
filter:blur(80px);
}

.container{
max-width:1300px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:rgba(18,22,31,.8);
backdrop-filter:blur(16px);
border-radius:18px;
padding:20px;
box-shadow:0 15px 60px rgba(0,0,0,.6);
}

.stat{
font-size:24px;
font-weight:600;
}

input,select{
width:100%;
padding:8px;
margin-top:6px;
background:#0e1219;
border:none;
color:white;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px;
background:#4da3ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.rowCharts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

canvas{
max-height:240px;
}

table{
width:100%;
}

.quote{
margin-top:30px;
opacity:.7;
font-style:italic;
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="container">

<h1>Portfolio Dashboard</h1>

<div class="grid">

<div class="card">
<h3>Total Invested</h3>
<div class="stat" id="invested">₹0</div>
</div>

<div class="card">
<h3>Current Portfolio</h3>
<div class="stat" id="current">₹0</div>
<div id="profit"></div>
</div>

<div class="card">
<h3>Holdings</h3>
<table id="holdings"></table>
</div>

<div class="card">
<h3>Monthly Activity</h3>
<div id="timeline"></div>
</div>

<div class="card">

<h3>Buy Asset</h3>

<select id="assetType">
<option value="stock">Stock</option>
<option value="mf">Mutual Fund (SIP)</option>
</select>

<input id="name" placeholder="Stock or Fund Name">
<input id="qty" placeholder="Qty or SIP amount">
<input id="price" placeholder="Buy price / NAV">
<input id="sipDate" type="date">

<button onclick="buy()">Add</button>

</div>

<div class="card">

<h3>Sell Asset</h3>

<select id="sellAsset"></select> <input id="sellQty" placeholder="Qty"> <input id="sellPrice" placeholder="Sell price">

<button onclick="sell()">Sell</button>

</div>

<div class="card">

<h3>Update Market Price</h3>

<select id="priceAsset"></select> <input id="marketPrice" placeholder="Latest price">

<button onclick="updatePrice()">Update</button>

</div>

</div>

<div class="rowCharts">

<div class="card">
<h3>Portfolio Allocation</h3>
<canvas id="allocChart"></canvas>
</div>

<div class="card">
<h3>Future Wealth</h3>
<canvas id="futureChart"></canvas>
</div>

</div>

<div class="quote" id="quote"></div>

</div>

<script>

const cursor=document.getElementById("cursor")
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

let stocks=JSON.parse(localStorage.getItem("stocks"))||[]
let funds=JSON.parse(localStorage.getItem("funds"))||[]
let prices=JSON.parse(localStorage.getItem("prices"))||{}

function save(){
localStorage.setItem("stocks",JSON.stringify(stocks))
localStorage.setItem("funds",JSON.stringify(funds))
localStorage.setItem("prices",JSON.stringify(prices))
render()
}

function buy(){

let type=document.getElementById("assetType").value
let name=document.getElementById("name").value.trim()
let qty=parseFloat(document.getElementById("qty").value)
let price=parseFloat(document.getElementById("price").value)
let sipDate=document.getElementById("sipDate").value

if(!name||isNaN(qty)||isNaN(price)) return

if(type==="stock"){
stocks.push({name,qty,price})
}

if(type==="mf"){
funds.push({name,sip:qty,nav:price,start:sipDate})
}

save()

}

function sell(){

let name=document.getElementById("sellAsset").value
let qty=parseFloat(document.getElementById("sellQty").value)

let s=stocks.find(x=>x.name===name)

if(!s) return

s.qty-=qty

if(s.qty<=0){
stocks=stocks.filter(x=>x.name!==name)
}

save()

}

function updatePrice(){

let name=document.getElementById("priceAsset").value
let p=parseFloat(document.getElementById("marketPrice").value)

if(isNaN(p)) return

prices[name]=p

save()

}

function monthsBetween(start){

let s=new Date(start)
let now=new Date()

return (now.getFullYear()-s.getFullYear())*12+(now.getMonth()-s.getMonth())+1

}

function render(){

let invested=0
let current=0
let holdings={}
let timeline=""

stocks.forEach(s=>{

holdings[s.name]=(holdings[s.name]||0)+s.qty

let mp=prices[s.name]||s.price

invested+=s.qty*s.price
current+=s.qty*mp

timeline+=`${s.name} BUY ${s.qty} @ ₹${s.price}<br>`

})

funds.forEach(f=>{

let m=monthsBetween(f.start)
let investedMF=m*f.sip

invested+=investedMF
current+=investedMF

holdings[f.name]="₹"+investedMF

timeline+=`${f.name} SIP ₹${f.sip} × ${m} months<br>`

})

let table=document.getElementById("holdings")
table.innerHTML=""

for(let a in holdings){
table.innerHTML+=`<tr><td>${a}</td><td>${holdings[a]}</td></tr>`
}

document.getElementById("sellAsset").innerHTML=stocks.map(s=>`<option>${s.name}</option>`).join("")
document.getElementById("priceAsset").innerHTML=[...stocks.map(s=>s.name),...funds.map(f=>f.name)].map(a=>`<option>${a}</option>`).join("")

document.getElementById("invested").innerText="₹"+invested.toFixed(2)
document.getElementById("current").innerText="₹"+current.toFixed(2)
document.getElementById("profit").innerText="P/L ₹"+(current-invested).toFixed(2)

document.getElementById("timeline").innerHTML=timeline

if(window.allocChart) window.allocChart.destroy()
if(window.futureChart) window.futureChart.destroy()

window.allocChart=new Chart(document.getElementById("allocChart"),{
type:"doughnut",
data:{
labels:["Invested","Profit"],
datasets:[{
data:[invested,current-invested],
backgroundColor:["#4da3ff","#ff5c7a"]
}]
},
options:{plugins:{legend:{display:false}}}
})

let sip=2100
let r=0.12/12
let total=0
let vals=[]

for(let i=0;i<240;i++){
total=total*(1+r)+sip
if(i%12===0) vals.push(Math.round(total))
}

window.futureChart=new Chart(document.getElementById("futureChart"),{
type:"line",
data:{
labels:Array.from({length:20},(_,i)=>i+1),
datasets:[{
data:vals,
borderColor:"#4da3ff",
tension:.3
}]
},
options:{plugins:{legend:{display:false}}}
})

const quotes=[
"Compounding quietly rewrites your future.",
"Markets fluctuate. Discipline compounds.",
"Every SIP is a vote for your future self.",
"Time in market beats timing the market."
]

document.getElementById("quote").innerText=quotes[Math.floor(Math.random()*quotes.length)]

}

render()

</script>

</body>
</html>
